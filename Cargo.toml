[package]
name = "twitchdrops_miner"
version = "1.0.0"
edition = "2024"

[dependencies]
reqwest = { version = "0.13.2", features = ["json"] }
tokio = { version = "1.50.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
twitch-gql-rs = "0.3.0"
dialoguer = "0.12.0"
once_cell = "1.21.4"
tokio-tungstenite = { version = "0.29.0", features = ["rustls-tls-native-roots"] }
futures-util = "0.3.32"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
indicatif = "0.18.4"
tracing-appender = "0.2.4"
auto-launch = "0.6.0"
rand = "0.10.0"
chrono = "0.4.44"